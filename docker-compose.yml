services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: horusdrive_app

    working_dir: /var/www

    volumes:
      - ./:/var/www/

    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:latest

    container_name: horusdrive_nginx

    ports:
      - "8000:80"

    volumes:
      - ./:/var/www/
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - app

  postgres:
    image: postgres:17

    container_name: horusdrive_postgres

    environment:
      POSTGRES_DB: horusdrive
      POSTGRES_USER: horus
      POSTGRES_PASSWORD: secret

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8

    container_name: horusdrive_redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data
  
  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: horusdrive_worker

    working_dir: /var/www

    # command: php artisan queue:work --verbose
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=120

    volumes:
      - ./:/var/www

    depends_on:
      - redis
      - postgres
  
volumes:
  postgres_data:
  redis_data: