name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  php-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: laravel
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP dependencies cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Setup PHP
        uses: shivammathur/setup-php@v4
        with:
          php-version: '8.3'
          extensions: pgsql, pdo_pgsql
          coverage: xdebug
      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist
      - name: Prepare environment
        run: |
          cp .env.example .env
          php -r "file_exists('.env') || copy('.env.example', '.env');"
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel
          DB_USERNAME: laravel
          DB_PASSWORD: password
      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h 127.0.0.1 -p 5432; then
              echo 'Postgres is ready' && break
            fi
            echo 'Waiting for Postgres...' && sleep 2
          done
      - name: Run migrations
        run: php artisan migrate --force
      - name: Run tests with coverage
        run: |
          # Generate coverage in Clover XML format for Codecov
          vendor/bin/phpunit --colors=always --coverage-clover=coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Run artisan --version
        run: php artisan --version || true
